name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install
      run: pip install -r requirements.txt
    - name: Imports
      run: python -c "import streamlit, groq, pandas, plotly, scipy, numpy; print('OK')"
    - name: Structure
      run: |
        python -c "
        import os
        files = [
          'main_app.py', 'config.py', 'requirements.txt',
          'module1_voice_of_customer/01_extract_reviews.py',
          'module1_voice_of_customer/voc_analyzer.py',
          'module1_voice_of_customer/app.py',
          'module2_store_pulse_map/app.py',
          'module3_test_and_learn/app.py',
          'module4_analyst_copilot/app.py',
        ]
        missing = [f for f in files if not os.path.exists(f)]
        assert not missing, f'Missing: {missing}'
        print('All files present')
        "
