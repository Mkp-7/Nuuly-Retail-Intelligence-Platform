name: Scrape App Store Reviews

on:
  push:
    paths:
      - 'config.py'          # triggers whenever you edit config.py
  schedule:
    - cron: '0 6 * * 1'     # also runs every Monday 6am UTC (weekly fresh data)
  workflow_dispatch:          # allows manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    permissions:
      contents: write          # needed to commit data files back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python module1_voice_of_customer/01_extract_reviews.py

      - name: Commit data files back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/reviews.csv
          git diff --staged --quiet || git commit -m "Auto-update reviews data [skip ci]"
          git push
